<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Network Tools</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Network Toolbox</h1>

<div>
    <h2>Your IP</h2>
    <p id="ip">Loading...</p>
</div>

<div>
    <h2>Latency Test</h2>
    <p id="latency">Testing...</p>
</div>

<div>
    <h2>DNS Resolve</h2>
    <p id="dns">Resolving...</p>
</div>

<div>
    <h2>WebRTC Leak</h2>
    <p id="webrtc">Checking...</p>
</div>

<script>
// IP
fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {
    document.getElementById("ip").innerText = data.ip;
});

// Latency
(async () => {
    const start = performance.now();
    await fetch("https://www.cloudflare.com/cdn-cgi/trace");
    const latency = Math.round(performance.now() - start);
    document.getElementById("latency").innerText = latency + " ms";
})();

// DNS
fetch("https://cloudflare-dns.com/dns-query?name=example.com&type=A", {
    headers: { "accept": "application/dns-json" }
})
.then(res => res.json())
.then(data => {
    if (data.Answer) {
        document.getElementById("dns").innerText =
            data.Answer.map(a => a.data).join(", ");
    } else {
        document.getElementById("dns").innerText = "No result";
    }
});

// WebRTC
(async () => {
    const pc = new RTCPeerConnection({iceServers:[]});
    pc.createDataChannel("");
    pc.createOffer().then(offer => pc.setLocalDescription(offer));

    pc.onicecandidate = (event) => {
        if (!event || !event.candidate) return;
        const ipMatch = event.candidate.candidate.match(
            /([0-9]{1,3}(\.[0-9]{1,3}){3})/
        );
        if (ipMatch) {
            document.getElementById("webrtc").innerText = ipMatch[1];
            pc.close();
        }
    };
})();
</script>
<!-- Honeypot (anti-bot invisible) -->
<form style="position:absolute; left:-9999px; top:-9999px;">
    <input type="text" name="email" id="trap">
</form>
</body>
</html>
